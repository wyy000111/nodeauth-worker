name = "nodeauth-worker"
main = "backend/src/app/worker.ts" 
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "frontend/dist" 
not_found_handling = "single-page-application"

[build]
command = "npm run build --prefix frontend" 

[[d1_databases]]
binding = "DB"
database_name = "nodeauth-db"

[triggers]
crons = ["0 2 * * *"]

[env.dev]
[[env.dev.d1_databases]]
binding = "DB"
database_name = "nodeauth-db-dev"
database_id = "9e591736-5dbb-4f09-8769-0270d7257731"
